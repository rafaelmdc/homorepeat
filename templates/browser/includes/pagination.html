{% if page_obj.has_other_pages %}
  <nav class="pagination-bar" aria-label="Pagination">
    {% if page_obj.has_previous %}
      <a class="btn btn-outline-secondary" href="?{% if page_query %}{{ page_query }}&amp;{% endif %}page={{ page_obj.previous_page_number }}">Previous</a>
    {% endif %}
    <span class="pagination-status">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
      <a class="btn btn-outline-secondary" href="?{% if page_query %}{{ page_query }}&amp;{% endif %}page={{ page_obj.next_page_number }}">Next</a>
    {% endif %}
  </nav>
{% endif %}
