services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    shm_size: ${POSTGRES_SHM_SIZE:-1gb}
    command:
      - postgres
      - -c
      - max_wal_size=${POSTGRES_MAX_WAL_SIZE:-8GB}
      - -c
      - min_wal_size=${POSTGRES_MIN_WAL_SIZE:-1GB}
      - -c
      - checkpoint_timeout=${POSTGRES_CHECKPOINT_TIMEOUT:-30min}
      - -c
      - checkpoint_completion_target=${POSTGRES_CHECKPOINT_COMPLETION_TARGET:-0.9}
      - -c
      - wal_compression=${POSTGRES_WAL_COMPRESSION:-on}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-64MB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-256MB}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homorepeat}
      POSTGRES_USER: ${POSTGRES_USER:-homorepeat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homorepeat}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    image: homorepeat-web:dev
    working_dir: /app
    command: >
      sh -c "
        attempts=0
        until getent hosts $$DATABASE_HOST >/dev/null 2>&1; do
          attempts=$$((attempts + 1))
          if [ $$attempts -ge 30 ]; then
            echo 'Could not resolve database host' $$DATABASE_HOST >&2
            exit 1
          fi
          echo 'Waiting for database host' $$DATABASE_HOST 'to resolve...'
          sleep 2
        done
        python manage.py migrate
      "
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-UTC}
      DATABASE_ENGINE: ${DATABASE_ENGINE:-django.db.backends.postgresql}
      DATABASE_NAME: ${POSTGRES_DB:-homorepeat}
      DATABASE_USER: ${POSTGRES_USER:-homorepeat}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-homorepeat}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      HOMOREPEAT_RUNS_ROOT: /workspace/homorepeat_pipeline/runs
    volumes:
      - .:/app
      - ${HOMOREPEAT_RUNS_ROOT:-../homorepeat_pipeline/runs}:/workspace/homorepeat_pipeline/runs:ro
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: containers/web.Dockerfile
    image: homorepeat-web:dev
    working_dir: /app
    command: >
      sh -c "
        attempts=0
        until getent hosts $$DATABASE_HOST >/dev/null 2>&1; do
          attempts=$$((attempts + 1))
          if [ $$attempts -ge 30 ]; then
            echo 'Could not resolve database host' $$DATABASE_HOST >&2
            exit 1
          fi
          echo 'Waiting for database host' $$DATABASE_HOST 'to resolve...'
          sleep 2
        done
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --log-level info
      "
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-UTC}
      DATABASE_ENGINE: ${DATABASE_ENGINE:-django.db.backends.postgresql}
      DATABASE_NAME: ${POSTGRES_DB:-homorepeat}
      DATABASE_USER: ${POSTGRES_USER:-homorepeat}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-homorepeat}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      HOMOREPEAT_RUNS_ROOT: /workspace/homorepeat_pipeline/runs
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      FLOWER_INTERNAL_URL: http://flower:5555
    volumes:
      - .:/app
      - ${HOMOREPEAT_RUNS_ROOT:-../homorepeat_pipeline/runs}:/workspace/homorepeat_pipeline/runs:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  celery-import-worker:
    image: homorepeat-web:dev
    working_dir: /app
    command: celery -A config.celery worker -Q imports -c 2 --prefetch-multiplier 1 --loglevel=info
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-UTC}
      DATABASE_ENGINE: ${DATABASE_ENGINE:-django.db.backends.postgresql}
      DATABASE_NAME: ${POSTGRES_DB:-homorepeat}
      DATABASE_USER: ${POSTGRES_USER:-homorepeat}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-homorepeat}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      HOMOREPEAT_RUNS_ROOT: /workspace/homorepeat_pipeline/runs
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - .:/app
      - ${HOMOREPEAT_RUNS_ROOT:-../homorepeat_pipeline/runs}:/workspace/homorepeat_pipeline/runs:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config.celery inspect ping -d celery@$$HOSTNAME --timeout 5 2>&1 | grep -q pong"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

  # CPU/DB-bound stats bundle pre-warming (payload_graph queue).
  # Autoscales between 1 and 4 workers; post-import fan-out may spike briefly.
  celery-graph-worker:
    image: homorepeat-web:dev
    working_dir: /app
    command: celery -A config.celery worker -Q payload_graph --autoscale 4,1 --loglevel=info
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-UTC}
      DATABASE_ENGINE: ${DATABASE_ENGINE:-django.db.backends.postgresql}
      DATABASE_NAME: ${POSTGRES_DB:-homorepeat}
      DATABASE_USER: ${POSTGRES_USER:-homorepeat}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-homorepeat}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config.celery inspect ping -d celery@$$HOSTNAME --timeout 5 2>&1 | grep -q pong"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

  # I/O-bound download artifact generation (downloads queue).
  # Low fixed concurrency; no prefetch so large jobs don't block the pool.
  celery-download-worker:
    image: homorepeat-web:dev
    working_dir: /app
    command: celery -A config.celery worker -Q downloads -c 2 --prefetch-multiplier 1 --loglevel=info
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-UTC}
      DATABASE_ENGINE: ${DATABASE_ENGINE:-django.db.backends.postgresql}
      DATABASE_NAME: ${POSTGRES_DB:-homorepeat}
      DATABASE_USER: ${POSTGRES_USER:-homorepeat}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-homorepeat}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config.celery inspect ping -d celery@$$HOSTNAME --timeout 5 2>&1 | grep -q pong"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

  celery-beat:
    image: homorepeat-web:dev
    working_dir: /app
    command: celery -A config.celery beat --loglevel=info
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-UTC}
      DATABASE_ENGINE: ${DATABASE_ENGINE:-django.db.backends.postgresql}
      DATABASE_NAME: ${POSTGRES_DB:-homorepeat}
      DATABASE_USER: ${POSTGRES_USER:-homorepeat}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-homorepeat}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      HOMOREPEAT_RUNS_ROOT: /workspace/homorepeat_pipeline/runs
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - .:/app
      - ${HOMOREPEAT_RUNS_ROOT:-../homorepeat_pipeline/runs}:/workspace/homorepeat_pipeline/runs:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  flower:
    image: homorepeat-web:dev
    working_dir: /app
    command: celery -A config.celery flower --port=5555 --url_prefix=admin/flower
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DATABASE_ENGINE: ${DATABASE_ENGINE:-django.db.backends.postgresql}
      DATABASE_NAME: ${POSTGRES_DB:-homorepeat}
      DATABASE_USER: ${POSTGRES_USER:-homorepeat}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-homorepeat}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
