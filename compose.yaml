services:
  postgres:
    image: postgres:16-alpine
    shm_size: ${POSTGRES_SHM_SIZE:-1gb}
    command:
      - postgres
      - -c
      - max_wal_size=${POSTGRES_MAX_WAL_SIZE:-8GB}
      - -c
      - min_wal_size=${POSTGRES_MIN_WAL_SIZE:-1GB}
      - -c
      - checkpoint_timeout=${POSTGRES_CHECKPOINT_TIMEOUT:-30min}
      - -c
      - checkpoint_completion_target=${POSTGRES_CHECKPOINT_COMPLETION_TARGET:-0.9}
      - -c
      - wal_compression=${POSTGRES_WAL_COMPRESSION:-on}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-64MB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-256MB}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homorepeat}
      POSTGRES_USER: ${POSTGRES_USER:-homorepeat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homorepeat}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      dockerfile: containers/web.Dockerfile
    image: homorepeat-web:dev
    working_dir: /app
    command: >
      sh -c "
        attempts=0
        until getent hosts $$DATABASE_HOST >/dev/null 2>&1; do
          attempts=$$((attempts + 1))
          if [ $$attempts -ge 30 ]; then
            echo 'Could not resolve database host' $$DATABASE_HOST >&2
            exit 1
          fi
          echo 'Waiting for database host' $$DATABASE_HOST 'to resolve...'
          sleep 2
        done
        python manage.py migrate
      "
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-UTC}
      DATABASE_ENGINE: ${DATABASE_ENGINE:-django.db.backends.postgresql}
      DATABASE_NAME: ${DATABASE_NAME:-homorepeat}
      DATABASE_USER: ${DATABASE_USER:-homorepeat}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-homorepeat}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      HOMOREPEAT_RUNS_ROOT: /workspace/homorepeat_pipeline/runs
    volumes:
      - .:/app
      - ${HOMOREPEAT_RUNS_ROOT:-../homorepeat_pipeline/runs}:/workspace/homorepeat_pipeline/runs:ro
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: containers/web.Dockerfile
    image: homorepeat-web:dev
    working_dir: /app
    command: >
      sh -c "
        attempts=0
        until getent hosts $$DATABASE_HOST >/dev/null 2>&1; do
          attempts=$$((attempts + 1))
          if [ $$attempts -ge 30 ]; then
            echo 'Could not resolve database host' $$DATABASE_HOST >&2
            exit 1
          fi
          echo 'Waiting for database host' $$DATABASE_HOST 'to resolve...'
          sleep 2
        done
        python manage.py runserver 0.0.0.0:8000
      "
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-UTC}
      DATABASE_ENGINE: ${DATABASE_ENGINE:-django.db.backends.postgresql}
      DATABASE_NAME: ${DATABASE_NAME:-homorepeat}
      DATABASE_USER: ${DATABASE_USER:-homorepeat}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-homorepeat}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      HOMOREPEAT_RUNS_ROOT: /workspace/homorepeat_pipeline/runs
    volumes:
      - .:/app
      - ${HOMOREPEAT_RUNS_ROOT:-../homorepeat_pipeline/runs}:/workspace/homorepeat_pipeline/runs:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: containers/web.Dockerfile
    image: homorepeat-web:dev
    working_dir: /app
    command: >
      sh -c "
        attempts=0
        until getent hosts $$DATABASE_HOST >/dev/null 2>&1; do
          attempts=$$((attempts + 1))
          if [ $$attempts -ge 30 ]; then
            echo 'Could not resolve database host' $$DATABASE_HOST >&2
            exit 1
          fi
          echo 'Waiting for database host' $$DATABASE_HOST 'to resolve...'
          sleep 2
        done
        python manage.py import_worker --poll-interval 2
      "
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-UTC}
      DATABASE_ENGINE: ${DATABASE_ENGINE:-django.db.backends.postgresql}
      DATABASE_NAME: ${DATABASE_NAME:-homorepeat}
      DATABASE_USER: ${DATABASE_USER:-homorepeat}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-homorepeat}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      HOMOREPEAT_RUNS_ROOT: /workspace/homorepeat_pipeline/runs
    volumes:
      - .:/app
      - ${HOMOREPEAT_RUNS_ROOT:-../homorepeat_pipeline/runs}:/workspace/homorepeat_pipeline/runs:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
